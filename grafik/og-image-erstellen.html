<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG-Image Generator – Füreinander Freiburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #1a1a1a;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #canvas-container {
      position: relative;
    }
    #og-canvas {
      border: 2px solid #444;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .controls {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      max-width: 1200px;
      width: 100%;
    }
    .controls h2 {
      color: #fff;
      margin-bottom: 15px;
    }
    .controls p {
      color: #aaa;
      margin-bottom: 20px;
    }
    button {
      background: #a9e2cc;
      color: #1a2820;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #8ed4b8;
      transform: translateY(-2px);
    }
    .info {
      color: #ffda69;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <h2>OG-Image Generator</h2>
    <p>Klicke auf "Download", um das OG-Image als <code>og-image.png</code> herunterzuladen und in <code>/grafik/</code> zu speichern.</p>
    <button onclick="downloadImage()">📥 og-image.png herunterladen</button>
    <p class="info">Maße: 1200×630 px · Format: PNG · Größe: ~50 KB</p>
  </div>

  <div id="canvas-container">
    <canvas id="og-canvas" width="1200" height="630"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('og-canvas');
    const ctx = canvas.getContext('2d');

    // Farben
    const CREAM = '#FEFAE0';
    const DARK_BROWN = '#3d3225';
    const MINT = '#a9e2cc';
    const WARM_YELLOW = '#ffda69';

    const pusteblume = new Image();
    pusteblume.src = 'hero_grafik.png';

    function drawOGImage() {
      // Hintergrund
      ctx.fillStyle = CREAM;
      ctx.fillRect(0, 0, 1200, 630);

      // Pusteblume rechts, dezent (wie im Hero)
      if (pusteblume.complete && pusteblume.naturalWidth) {
        const imgW = 620;
        const imgH = imgW * (pusteblume.naturalHeight / pusteblume.naturalWidth);
        ctx.globalAlpha = 0.9;
        ctx.drawImage(pusteblume, 620, 315 - imgH / 2, imgW, imgH);
        ctx.globalAlpha = 1;
      }

      // Akzent-Linie oben
      ctx.fillStyle = MINT;
      ctx.fillRect(0, 0, 1200, 8);

      // Kicker (Ort)
      ctx.fillStyle = '#8a7a60';
      ctx.font = 'italic 26px "Source Serif 4", Georgia, serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('Freiburg im Breisgau', 80, 200);

      // Titel
      ctx.fillStyle = DARK_BROWN;
      ctx.font = '700 76px "Playfair Display", Georgia, serif';
      ctx.fillText('Füreinander Freiburg', 80, 290);

      // Untertitel (zweizeilig)
      ctx.fillStyle = '#5c4e3a';
      ctx.font = '30px "Source Serif 4", Georgia, serif';
      ctx.fillText('Selbsthilfegruppe für zweifelnde und', 80, 360);
      ctx.fillText('ausgestiegene Zeugen Jehovas', 80, 402);

      // Akzent-Unterstrich
      ctx.fillStyle = MINT;
      ctx.fillRect(80, 440, 120, 6);

      // Domain unten
      ctx.fillStyle = '#6f6047';
      ctx.font = '600 24px "Source Serif 4", Georgia, serif';
      ctx.fillText('fuereinander-freiburg.de', 80, 560);
    }

    function downloadImage() {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'og-image.png';
        a.click();
        URL.revokeObjectURL(url);

        alert('✅ og-image.png wurde heruntergeladen.\n\nSpeichere die Datei in:\ngrafik/og-image.png');
      }, 'image/png');
    }

    // Render erst wenn Fonts UND Pusteblume geladen sind
    function renderWhenReady() {
      Promise.all([
        document.fonts.ready,
        pusteblume.complete ? Promise.resolve() : new Promise(res => {
          pusteblume.onload = res;
          pusteblume.onerror = res; // ohne Bild trotzdem rendern
        })
      ]).then(drawOGImage);
    }
    renderWhenReady();
  </script>
</body>
</html>
